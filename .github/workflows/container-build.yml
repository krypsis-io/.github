name: Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Container image name (defaults to repo name)"
        type: string
        default: ""
      registry:
        description: "Container registry"
        type: string
        default: "ghcr.io"
      dockerfile:
        description: "Path to Dockerfile/Containerfile"
        type: string
        default: "Dockerfile"
      context:
        description: "Build context path"
        type: string
        default: "."
      platforms:
        description: "Comma-separated platforms to build"
        type: string
        default: "linux/amd64,linux/arm64"
      build-args:
        description: "Newline-separated build args (KEY=VALUE)"
        type: string
        default: ""
      tag-suffix:
        description: "Optional suffix appended to all tags"
        type: string
        default: ""
      use-qemu:
        description: "Use QEMU emulation instead of native ARM runners (for private repos)"
        type: boolean
        default: false
      dockerhub-image:
        description: "Optional Docker Hub image name (e.g. docker.io/user/repo). If empty, Docker Hub is skipped."
        type: string
        default: ""
    secrets:
      REGISTRY_USERNAME:
        required: false
        description: "Registry username (defaults to github.actor for GHCR)"
      REGISTRY_PASSWORD:
        required: false
        description: "Registry password (defaults to GITHUB_TOKEN for GHCR)"
      DOCKERHUB_USERNAME:
        required: false
        description: "Docker Hub username (required if dockerhub-image is set)"
      DOCKERHUB_TOKEN:
        required: false
        description: "Docker Hub access token (required if dockerhub-image is set)"

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      image: ${{ steps.meta.outputs.image }}
      tags: ${{ steps.meta.outputs.tags }}
      staging-tag: ${{ steps.meta.outputs.staging-tag }}
      dockerhub-tags: ${{ steps.meta.outputs.dockerhub-tags }}
    steps:
      - name: Generate platform matrix
        id: matrix
        env:
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          INPUT_USE_QEMU: ${{ inputs.use-qemu }}
        run: |
          IFS=',' read -ra PLATFORMS <<< "$INPUT_PLATFORMS"
          MATRIX="["
          FIRST=true
          for PLATFORM in "${PLATFORMS[@]}"; do
            PLATFORM=$(echo "$PLATFORM" | xargs)
            ARCH="${PLATFORM##*/}"

            # Select runner: native ARM runner unless use-qemu is enabled
            if [ "$INPUT_USE_QEMU" = "true" ] || [ "$ARCH" = "amd64" ]; then
              RUNNER="ubuntu-latest"
            else
              RUNNER="ubuntu-24.04-arm"
            fi

            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX="$MATRIX,"
            fi
            MATRIX="$MATRIX{\"platform\":\"$PLATFORM\",\"arch\":\"$ARCH\",\"runner\":\"$RUNNER\"}"
          done
          MATRIX="$MATRIX]"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

      - name: Set image metadata
        id: meta
        env:
          INPUT_REGISTRY: ${{ inputs.registry }}
          INPUT_IMAGE_NAME: ${{ inputs.image-name }}
          INPUT_TAG_SUFFIX: ${{ inputs.tag-suffix }}
          INPUT_DOCKERHUB_IMAGE: ${{ inputs.dockerhub-image }}
        run: |
          REGISTRY="$INPUT_REGISTRY"
          IMAGE="$INPUT_IMAGE_NAME"
          if [ -z "$IMAGE" ]; then
            IMAGE="${GITHUB_REPOSITORY,,}"
          fi
          FULL_IMAGE="${REGISTRY}/${IMAGE}"
          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

          TAGS=""
          SUFFIX="$INPUT_TAG_SUFFIX"

          # Determine tags based on trigger event
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${FULL_IMAGE}:${VERSION}${SUFFIX} ${FULL_IMAGE}:latest${SUFFIX}"
          elif [[ "$GITHUB_REF" == refs/pull/* ]]; then
            BRANCH="${GITHUB_HEAD_REF//\//-}"
            TAGS="${FULL_IMAGE}:${BRANCH}${SUFFIX}"
          elif [[ "$GITHUB_REF" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            BRANCH="${BRANCH//\//-}"
            TAGS="${FULL_IMAGE}:${BRANCH}${SUFFIX}"
          else
            SHA="${GITHUB_SHA::8}"
            TAGS="${FULL_IMAGE}:sha-${SHA}${SUFFIX}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

          # Docker Hub tags (only for tagged releases when dockerhub-image is set)
          DOCKERHUB_IMAGE="$INPUT_DOCKERHUB_IMAGE"
          DOCKERHUB_TAGS=""
          if [ -n "$DOCKERHUB_IMAGE" ] && [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            DOCKERHUB_TAGS="${DOCKERHUB_IMAGE}:${VERSION}${SUFFIX} ${DOCKERHUB_IMAGE}:latest${SUFFIX}"
          fi
          echo "dockerhub-tags=$DOCKERHUB_TAGS" >> "$GITHUB_OUTPUT"

          # Staging tag prefix for per-platform images
          SHA="${GITHUB_SHA::8}"
          echo "staging-tag=${FULL_IMAGE}:staging-${SHA}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install QEMU for cross-platform emulation
        if: inputs.use-qemu && matrix.arch != 'amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static

      - name: Login to registry
        env:
          REG_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REGISTRY: ${{ inputs.registry }}
        run: |
          USERNAME="$REG_USERNAME"
          PASSWORD="$REG_PASSWORD"
          if [ -z "$USERNAME" ]; then USERNAME="$ACTOR"; fi
          if [ -z "$PASSWORD" ]; then PASSWORD="$GH_TOKEN"; fi
          echo "$PASSWORD" | buildah login -u "$USERNAME" --password-stdin "$INPUT_REGISTRY"

      - name: Build and push (${{ matrix.platform }})
        env:
          STAGING_TAG: ${{ needs.prepare.outputs.staging-tag }}
          MATRIX_ARCH: ${{ matrix.arch }}
          MATRIX_PLATFORM: ${{ matrix.platform }}
          INPUT_DOCKERFILE: ${{ inputs.dockerfile }}
          INPUT_BUILD_ARGS: ${{ inputs.build-args }}
          INPUT_CONTEXT: ${{ inputs.context }}
        run: |
          FULL_STAGING_TAG="${STAGING_TAG}-${MATRIX_ARCH}"

          BUILD_CMD="buildah build \
            --platform ${MATRIX_PLATFORM} \
            --format oci \
            -f ${INPUT_DOCKERFILE} \
            -t ${FULL_STAGING_TAG}"

          # Add build args
          if [ -n "$INPUT_BUILD_ARGS" ]; then
            while IFS= read -r arg; do
              [ -n "$arg" ] && BUILD_CMD="$BUILD_CMD --build-arg $arg"
            done <<< "$INPUT_BUILD_ARGS"
          fi

          BUILD_CMD="$BUILD_CMD ${INPUT_CONTEXT}"
          eval "$BUILD_CMD"

          # Push per-platform image to registry
          buildah push "${FULL_STAGING_TAG}" "docker://${FULL_STAGING_TAG}"

  manifest:
    name: Create & Push Manifest
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Login to registry
        env:
          REG_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REG_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_REGISTRY: ${{ inputs.registry }}
        run: |
          USERNAME="$REG_USERNAME"
          PASSWORD="$REG_PASSWORD"
          if [ -z "$USERNAME" ]; then USERNAME="$ACTOR"; fi
          if [ -z "$PASSWORD" ]; then PASSWORD="$GH_TOKEN"; fi
          # Buildah login (for manifest operations)
          echo "$PASSWORD" | buildah login -u "$USERNAME" --password-stdin "$INPUT_REGISTRY"
          # Docker login (for cosign signature push)
          echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin "$INPUT_REGISTRY"

      - name: Login to Docker Hub
        if: needs.prepare.outputs.dockerhub-tags != ''
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "$DOCKERHUB_TOKEN" | buildah login -u "$DOCKERHUB_USERNAME" --password-stdin docker.io

      - name: Create and push manifest
        id: push
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          STAGING_TAG: ${{ needs.prepare.outputs.staging-tag }}
          IMAGE: ${{ needs.prepare.outputs.image }}
          DOCKERHUB_TAGS: ${{ needs.prepare.outputs.dockerhub-tags }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
        run: |
          FIRST_TAG=$(echo "$TAGS" | awk '{print $1}')

          # Parse platforms to get architectures
          IFS=',' read -ra PLATFORMS <<< "$INPUT_PLATFORMS"

          # Create manifest from per-platform registry images
          buildah manifest create "$FIRST_TAG"
          for PLATFORM in "${PLATFORMS[@]}"; do
            PLATFORM=$(echo "$PLATFORM" | xargs)
            ARCH="${PLATFORM##*/}"
            echo "Adding ${STAGING_TAG}-${ARCH} to manifest..."
            buildah manifest add "$FIRST_TAG" "docker://${STAGING_TAG}-${ARCH}"
          done

          # Push manifest with first tag and capture digest
          mkdir -p /tmp/digests
          echo "Pushing manifest as ${FIRST_TAG}..."
          buildah manifest push --all --digestfile /tmp/digests/manifest "$FIRST_TAG" "docker://${FIRST_TAG}"
          DIGEST=$(cat /tmp/digests/manifest)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Manifest digest: ${DIGEST}"

          # Push remaining GHCR tags
          for TAG in $TAGS; do
            if [ "$TAG" != "$FIRST_TAG" ]; then
              echo "Pushing manifest as ${TAG}..."
              buildah manifest push --all "$FIRST_TAG" "docker://${TAG}"
            fi
          done

          # Push Docker Hub tags
          if [ -n "$DOCKERHUB_TAGS" ]; then
            for TAG in $DOCKERHUB_TAGS; do
              echo "Pushing manifest as ${TAG}..."
              buildah manifest push --all "$FIRST_TAG" "docker://${TAG}"
            done
          fi

          # Clean up staging tags
          for PLATFORM in "${PLATFORMS[@]}"; do
            PLATFORM=$(echo "$PLATFORM" | xargs)
            ARCH="${PLATFORM##*/}"
            echo "Note: staging image ${STAGING_TAG}-${ARCH} can be cleaned up from the registry"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign container image
        env:
          IMAGE: ${{ needs.prepare.outputs.image }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          FULL_IMAGE="${IMAGE}@${DIGEST}"
          echo "Signing ${FULL_IMAGE}..."
          cosign sign --yes "${FULL_IMAGE}"
