name: Container Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Container image name (defaults to repo name)"
        type: string
        default: ""
      registry:
        description: "Container registry"
        type: string
        default: "ghcr.io"
      dockerfile:
        description: "Path to Dockerfile/Containerfile"
        type: string
        default: "Dockerfile"
      context:
        description: "Build context path"
        type: string
        default: "."
      platforms:
        description: "Comma-separated platforms to build"
        type: string
        default: "linux/amd64,linux/arm64"
      build-args:
        description: "Newline-separated build args (KEY=VALUE)"
        type: string
        default: ""
      tag-suffix:
        description: "Optional suffix appended to all tags"
        type: string
        default: ""
    secrets:
      REGISTRY_USERNAME:
        required: false
        description: "Registry username (defaults to github.actor for GHCR)"
      REGISTRY_PASSWORD:
        required: false
        description: "Registry password (defaults to GITHUB_TOKEN for GHCR)"

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install QEMU for multi-arch builds
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-user-static

      - name: Set image metadata
        id: meta
        run: |
          REGISTRY="${{ inputs.registry }}"
          IMAGE="${{ inputs.image-name }}"
          if [ -z "$IMAGE" ]; then
            IMAGE="${GITHUB_REPOSITORY,,}"
          fi
          FULL_IMAGE="${REGISTRY}/${IMAGE}"
          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

          TAGS=""
          SUFFIX="${{ inputs.tag-suffix }}"

          # Determine tags based on trigger event
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Release event with a version tag
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${FULL_IMAGE}:${VERSION}${SUFFIX} ${FULL_IMAGE}:latest${SUFFIX}"
          elif [[ "$GITHUB_REF" == refs/pull/* ]]; then
            # PR build — tag with branch name
            BRANCH="${GITHUB_HEAD_REF//\//-}"
            TAGS="${FULL_IMAGE}:${BRANCH}${SUFFIX}"
          elif [[ "$GITHUB_REF" == refs/heads/* ]]; then
            # Push to branch — tag with branch name
            BRANCH="${GITHUB_REF#refs/heads/}"
            BRANCH="${BRANCH//\//-}"
            TAGS="${FULL_IMAGE}:${BRANCH}${SUFFIX}"
          else
            SHA="${GITHUB_SHA::8}"
            TAGS="${FULL_IMAGE}:sha-${SHA}${SUFFIX}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        run: |
          USERNAME="${{ secrets.REGISTRY_USERNAME }}"
          PASSWORD="${{ secrets.REGISTRY_PASSWORD }}"
          if [ -z "$USERNAME" ]; then USERNAME="${{ github.actor }}"; fi
          if [ -z "$PASSWORD" ]; then PASSWORD="${{ secrets.GITHUB_TOKEN }}"; fi
          echo "$PASSWORD" | buildah login -u "$USERNAME" --password-stdin "${{ inputs.registry }}"

      - name: Build and push (multi-arch)
        run: |
          IFS=',' read -ra PLATFORMS <<< "${{ inputs.platforms }}"
          MANIFEST="${{ steps.meta.outputs.image }}:manifest-$$"

          # Build per-platform images
          for PLATFORM in "${PLATFORMS[@]}"; do
            PLATFORM=$(echo "$PLATFORM" | xargs)
            OS="${PLATFORM%%/*}"
            ARCH="${PLATFORM##*/}"
            echo "Building for ${OS}/${ARCH}..."

            BUILD_CMD="buildah build \
              --platform ${PLATFORM} \
              --format oci \
              -f ${{ inputs.dockerfile }} \
              -t ${MANIFEST}-${ARCH}"

            # Add build args
            BUILD_ARGS="${{ inputs.build-args }}"
            if [ -n "$BUILD_ARGS" ]; then
              while IFS= read -r arg; do
                [ -n "$arg" ] && BUILD_CMD="$BUILD_CMD --build-arg $arg"
              done <<< "$BUILD_ARGS"
            fi

            BUILD_CMD="$BUILD_CMD ${{ inputs.context }}"
            eval "$BUILD_CMD"
          done

          # Create manifest list
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | awk '{print $1}')

          buildah manifest create "$FIRST_TAG"
          for PLATFORM in "${PLATFORMS[@]}"; do
            PLATFORM=$(echo "$PLATFORM" | xargs)
            ARCH="${PLATFORM##*/}"
            buildah manifest add "$FIRST_TAG" "containers-storage:${MANIFEST}-${ARCH}"
          done

          # Push manifest with all tags
          for TAG in $TAGS; do
            buildah manifest push --all "$FIRST_TAG" "docker://${TAG}"
          done
