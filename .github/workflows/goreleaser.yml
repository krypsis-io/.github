name: GoReleaser

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod for Go version detection"
        type: string
        default: "go.mod"
    secrets:
      APP_ID:
        required: false
        description: "GitHub App ID for generating a Homebrew tap token (optional)"
      APP_PRIVATE_KEY:
        required: false
        description: "GitHub App private key for generating a Homebrew tap token (optional)"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Check for GitHub App credentials
        id: app-check
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Homebrew tap token
        id: tap-token
        if: steps.app-check.outputs.available == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token || '' }}
