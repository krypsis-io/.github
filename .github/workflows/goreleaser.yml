name: GoReleaser

on:
  workflow_call:
    inputs:
      go-version-file:
        description: "Path to go.mod for Go version detection"
        type: string
        default: "go.mod"
    secrets:
      APP_ID:
        required: false
        description: "GitHub App ID for generating a Homebrew tap token (optional)"
      APP_PRIVATE_KEY:
        required: false
        description: "GitHub App private key for generating a Homebrew tap token (optional)"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Check for GitHub App credentials
        id: app-check
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Homebrew tap token
        id: tap-token
        if: steps.app-check.outputs.available == 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ inputs.go-version-file }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.tap-token.outputs.token || '' }}
