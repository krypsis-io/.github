name: Semgrep

on:
  workflow_call:
    inputs:
      semgrep-config:
        description: "Semgrep config to use"
        type: string
        default: "auto"

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Run Semgrep
        env:
          SEMGREP_CONFIG: ${{ inputs.semgrep-config }}
        run: uvx semgrep scan --config="$SEMGREP_CONFIG" --autofix --json --output=semgrep-results.json
        continue-on-error: true

      # ── PR branch flow ────────────────────────────────────────────────────

      - name: Commit autofixes to branch
        if: github.event_name == 'pull_request'
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if git diff --quiet; then
            echo "No autofixes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: apply semgrep autofixes"
          git push origin "HEAD:$HEAD_REF"

      - name: Comment on PR for manual findings
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          BODY=$(uv run python3 - <<'PYEOF'
          import json, sys
          data = json.load(open("semgrep-results.json"))
          results = [r for r in data.get("results", []) if "fix" not in r.get("extra", {})]
          if not results:
              sys.exit(0)
          lines = ["## Semgrep findings requiring manual fixes\n"]
          lines.append("These findings have no automatic fix and require manual remediation.\n")
          for r in results:
              path = r["path"]
              line = r["start"]["line"]
              rule = r["check_id"]
              msg = r["extra"].get("message", "").strip().splitlines()[0]
              lines.append(f"- **{rule}** — `{path}:{line}`  \n  {msg}")
          print("\n".join(lines))
          PYEOF
          )
          if [ -z "$BODY" ]; then
            echo "No manual findings."
            exit 0
          fi
          gh pr comment "$PR_NUMBER" --body "$BODY"

      - name: Fail on findings
        if: github.event_name == 'pull_request'
        run: |
          COUNT=$(jq '.results | length' semgrep-results.json 2>/dev/null || echo 0)
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::Semgrep found $COUNT issue(s). See the PR comment for details."
            exit 1
          fi

      # ── Push to main flow (dependency updates, direct commits) ────────────

      - name: Open issue for findings on main
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          BODY=$(uv run python3 - <<'PYEOF'
          import json, os, sys
          data = json.load(open("semgrep-results.json"))
          results = data.get("results", [])
          if not results:
              sys.exit(0)
          trigger = os.environ.get("COMMIT_MESSAGE", "unknown commit").splitlines()[0]
          lines = ["## Semgrep findings introduced on main\n"]
          lines.append(f"**Triggered by:** {trigger}\n")
          lines.append("This likely came in via a dependency update or direct push.\n")
          for r in results:
              path = r["path"]
              line = r["start"]["line"]
              rule = r["check_id"]
              msg = r["extra"].get("message", "").strip().splitlines()[0]
              tag = " _(autofix available)_" if "fix" in r.get("extra", {}) else ""
              lines.append(f"- **{rule}** — `{path}:{line}`{tag}  \n  {msg}")
          print("\n".join(lines))
          PYEOF
          )
          if [ -z "$BODY" ]; then
            echo "No findings on main."
            exit 0
          fi
          gh issue create --title "Semgrep findings on main ($(date +%Y-%m-%d))" --body "$BODY" --label "security"
