name: Renovate

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run Renovate in dry-run mode (false or full)"
        type: choice
        options:
          - "false"
          - full
        default: "false"
      log-level:
        description: "Log level"
        type: choice
        options:
          - info
          - debug
        default: info

jobs:
  renovate:
    if: github.repository != 'krypsis-io/.github'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect mode
        id: mode
        run: |
          if [[ "${{ github.repository }}" == */.github ]]; then
            echo "autodiscover=true" >> "$GITHUB_OUTPUT"
            echo "repositories=" >> "$GITHUB_OUTPUT"
          else
            echo "autodiscover=false" >> "$GITHUB_OUTPUT"
            echo "repositories=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          RENOVATE_AUTODISCOVER: ${{ steps.mode.outputs.autodiscover }}
          RENOVATE_AUTODISCOVER_FILTER: /^${{ github.repository_owner }}\/(?!\.github$).*/
          RENOVATE_REPOSITORIES: ${{ steps.mode.outputs.repositories }}
