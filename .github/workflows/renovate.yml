name: Renovate

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run Renovate in dry-run mode (false or full)"
        type: choice
        options:
          - "false"
          - full
        default: "false"
      log-level:
        description: "Log level"
        type: choice
        options:
          - info
          - debug
        default: info

jobs:
  renovate:
    if: github.repository != 'krypsis-io/.github'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect mode
        id: mode
        run: |
          if [[ "${{ github.repository }}" == */.github ]]; then
            echo "autodiscover=true" >> "$GITHUB_OUTPUT"
            echo "repositories=" >> "$GITHUB_OUTPUT"
          else
            echo "autodiscover=false" >> "$GITHUB_OUTPUT"
            echo "repositories=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_DRY_RUN: ${{ inputs.dry-run || 'false' }}
          LOG_LEVEL: ${{ inputs.log-level || 'info' }}
          RENOVATE_AUTODISCOVER: ${{ steps.mode.outputs.autodiscover }}
          RENOVATE_AUTODISCOVER_FILTER: /^${{ github.repository_owner }}\/(?!\.github$).*/
          RENOVATE_REPOSITORIES: ${{ steps.mode.outputs.repositories }}
